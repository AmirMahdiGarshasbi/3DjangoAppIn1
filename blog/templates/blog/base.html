{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <title>My Blog</title>
</head>
<body>
    <h1>Welcome to my BLOG</h1>
    <h3>where you can enjoy from having a free say about anything you desire</h3>
    <nav>
        <div class="nav-title">
            <a href="{% url 'post-list' %}" class="text-gradient">💻Blog</a>
        </div>
        <div class="nav-item">
            <a href="{% url 'post-new' %}">Write a blog</a>
            <a href="{% url 'signup' %}">Sign Up</a>
            {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="logout">Log Out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </nav>
        {% block content %}
        {% endblock %}
    <footer>
        <h3>All rights reserved.</h3>
    </footer>
</body>
</html>
