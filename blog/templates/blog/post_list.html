{% extends 'blog/base.html' %}

{% block content %}
<div class="post-list">
    <h2>New Blogs</h2>
    {% for post in post_list %}
        <h4 class="post-list-title"><a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a></h4>
        <p class="post-list-body"><a href="{% url 'post-detail' post.pk %}">{{ post.body }}</a></p>
    {% endfor %}
</div>
{% endblock %}
